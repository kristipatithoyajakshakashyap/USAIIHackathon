version: "3.9"

services:
  prevail-api:
    build: ./backend
    container_name: prevail_api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./prevail_audit.db
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: prevail_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - prevail-api
    restart: unless-stopped